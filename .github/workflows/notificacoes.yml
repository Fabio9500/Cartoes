name: Notificações Cartões

on:
  schedule:
    - cron: '*/15 * * * *'   # a cada 15 minutos (GitHub pode atrasar um pouco em horários de pico)
  workflow_dispatch: {}       # permite rodar manualmente pela aba Actions, pra testar

permissions:
  contents: write

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verificar faturas e notificar
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node scripts/notificar.js

      - name: Salvar estado de notificações já enviadas
        run: |
          git config user.name "notificacoes-bot"
          git config user.email "actions@github.com"
          git add .notif-state.json
          git diff --staged --quiet || git commit -m "chore: atualiza estado de notificações"
          git push
