<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Fundo claro arredondado -->
  <rect width="192" height="192" rx="36" fill="#f5f3ef"/>
  <!-- Cartão principal -->
  <rect x="20" y="44" width="152" height="96" rx="12" fill="#c84b0c"/>
  <!-- Faixa chip/topo -->
  <rect x="20" y="44" width="152" height="36" rx="12" fill="#a83a08"/>
  <rect x="20" y="68" width="152" height="12" fill="#a83a08"/>
  <!-- Chip simulado -->
  <rect x="38" y="55" width="28" height="20" rx="4" fill="#f0a500"/>
  <line x1="44" y1="55" x2="44" y2="75" stroke="#a07800" stroke-width="1.5"/>
  <line x1="50" y1="55" x2="50" y2="75" stroke="#a07800" stroke-width="1.5"/>
  <line x1="56" y1="55" x2="56" y2="75" stroke="#a07800" stroke-width="1.5"/>
  <line x1="38" y1="65" x2="66" y2="65" stroke="#a07800" stroke-width="1.5"/>
  <!-- Número do cartão simulado -->
  <text x="38" y="112" font-family="'Courier New',monospace" font-size="16" fill="#fff" opacity="0.8" letter-spacing="3">•••• 1234</text>
  <!-- PF label -->
  <text x="154" y="130" font-family="'Segoe UI',system-ui,sans-serif" font-size="18" font-weight="900" fill="#fff" text-anchor="end" opacity="0.9">PF</text>
  <!-- Linha decorativa -->
  <text x="96" y="162" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="700" fill="#c84b0c" text-anchor="middle" opacity="0.6">PESSOAL</text>
</svg>
